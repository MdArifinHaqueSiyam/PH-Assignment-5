<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS and Daisy ui cdn -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon link -->
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <title>GitHub Issues Tracker | Siyam</title>
  </head>

  <body>
    <div class="flex justify-center">
      <div
        class="bg-white rounded-xl shadow-sm w-[500px] h-[743px] mb-[70px] mt-[70px] p-8 border border-gray-100"
      >
        <div class="flex flex-col items-center mb-8">
          <img src="assets/github-logo.png" alt="GitHub Logo" />

          <h1 class="font-bold text-2xl text-slate-800">
            GitHub Issues Tracker
          </h1>

          <p class="mt-1 text-slate-500 text-sm">
            Sign in to manage your issues
          </p>
        </div>

        <div class="space-y-5">
          <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1">
              Username</label
            >

            <input
              type="text"
              id="userInput"
              placeholder="Enter Username"
              class="border border-gray-200 rounded-lg px-4 py-3 w-full transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />

            <p class="mt-1 text-indigo-600 text-xs">Default: admin</p>
          </div>

          <div>
            <label class="block text-slate-700 text-sm font-semibold mb-1">
              Password</label
            >

            <input
              type="password"
              id="passInput"
              placeholder="Enter Password"
              class="border border-gray-200 rounded-lg px-4 py-3 w-full transition-all focus:outline-none focus:ring-2 focus:ring-indigo-500"
            />

            <p class="mt-1 text-indigo-600 text-xs">Default: admin123</p>
          </div>

          <button
            type="submit"
            id="loginBtn"
            class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg py-3 w-full shadow-lg shadow-indigo-200 transition-colors"
          >
            Sign In
          </button>
        </div>

        <div class="relative my-8">
          <div class="absolute inset-0 flex items-center">
            <span class="border-t border-gray-200 w-full"> </span>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-white text-slate-400 font-medium px-2"> OR</span>
          </div>
        </div>

        <p class="text-center text-slate-500 mb-2 font-medium text-1 xl">
          Demo Credentials:
        </p>

        <div
          class="bg-slate-50 rounded-lg border border-gray-50 p-5 text-center"
        >
          <div class="text-slate-700 text-sm">
            <p><span class="font-bold">Username:</span> admin</p>

            <p><span class="font-bold">Password:</span>  admin123</p>
          </div>
        </div>
      </div>
    </div>

    <script src="signin.js"></script>
  </body>
</html>
