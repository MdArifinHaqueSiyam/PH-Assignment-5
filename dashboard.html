<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <!-- Tailwind CSS and Daisy ui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Favicon link -->
    <link
      rel="shortcut icon"
      href="../assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome cdn -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      integrity="sha512-..."
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="bg-white">
    <!-- Nav Bar -->
    <header class="w-full mx-auto px-4 sm:px-8">
      <div
        class="bg-white border-b border-gray-100 flex flex-wrap items-center justify-between py-3 px-4"
      >
        <div class="flex items-center p-2 gap-3">
          <div class="w-8 h-8 flex items-center justify-center">
            <img src="./assets/github-logo.png" alt="GitHub Logo" />
          </div>

          <span class="font-bold text-slate-800 text-lg tracking-tight">
            GitHub Issues Tracker</span
          >
        </div>

        <div class="flex gap-4 items-center">
          <div class="sm:block">
            <input
              id="searchField"
              type="text"
              placeholder="Search issues..."
              class="border border-gray-200 bg-slate-50 text-sm rounded-md w-64 max-sm:w-[80%] py-2 pl-5 pr-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-white transition-all"
            />
          </div>

          <button
            class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-md py-2 px-4 transition-colors"
          >
            +New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content BTN and filter section -->
    <main class="px-4 py-6 max-w-7xl mx-auto">
      <div
        class="bg-white rounded-lg border border-gray-100 shadow-sm p-3 mb-4"
      >
        <div class="flex p-4 gap-2">
          <button
            id="filterAll"
            class="btn btn-sm bg-[#6322FF] text-white border-none px-8 normal-case"
          >
            All
          </button>
          <button
            id="filterOpen"
            class="btn btn-sm btn-ghost border border-gray-100 text-gray-500 px-8 normal-case"
          >
            Open
          </button>
          <button
            id="filterClosed"
            class="btn btn-sm btn-ghost border border-gray-100 text-gray-500 px-8 normal-case"
          >
            Closed
          </button>
        </div>
      </div>

      <section
        class="bg-white rounded-t-xl border border-gray-100 shadow-sm p-5 flex items-center justify-between"
      >
        <div class="flex gap-4 items-center">
          <div
            class="w-10 h-10 bg-indigo-50 text-[#6322FF] rounded-full flex items-center justify-center"
          >
            <img src="../assets/Aperture.png" alt="" />
          </div>
          <div>
            <h2 class="text-xl font-bold text-slate-800 leading-none">
              <span id="issueCount"></span> Issues
            </h2>
            <p class="text-sm text-slate-400 mt-1">
              Track and manage your project issues
            </p>
          </div>
        </div>

        <div class="flex gap-6 items-center">
          <div class="flex gap-2 items-center">
            <span class="w-2.5 h-2.5 bg-emerald-400 rounded-full"></span>
            <span class="text-sm font-medium text-slate-600">Open</span>
          </div>
          <div class="flex gap-2 items-center">
            <span class="w-[10px] h-[10px] bg-purple-500 rounded-full"></span>
            <span class="text-sm font-medium text-slate-600">Closed</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Issue Cards -->
    <section class="px-4 max-w-7xl mx-auto">
      <div
        id="cardContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mt-5 mb-5"
      >
        
      </div>

      <!-- Loading Spinner -->
      <div
        id="loadingSpinner"
        class="flex justify-center items-center py-8 hidden"
      >
        <span class="loading loading-spinner loading-xl"></span>
      </div>
    </section>

    <!-- Modal Section -->
    <section>
      <dialog id="detailModal" class="modal">
        <div class="modal-box">
          <div id="modalContent" class="space-y-2">
            
          </div>

          <div class="modal-action">
            <form method="dialog">
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </section>

    <script src="app.js"></script>
  </body>
</html>
